services:
  mongodb:
    image: mongo:7
    container_name: iot-sentinel-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: iot-sentinel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: iot-sentinel-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      MONGODB_URI: ${MONGODB_URI}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - api_secrets:/data/secrets
    depends_on:
      - mongodb
      - redis

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: iot-sentinel-worker
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      REDIS_URL: ${REDIS_URL}
      SCANNER_MOCK_MODE: ${SCANNER_MOCK_MODE:-false}
    depends_on:
      - redis

volumes:
  mongodb_data:
  redis_data:
  api_secrets:
