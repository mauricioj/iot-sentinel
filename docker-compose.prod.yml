# IoT Sentinel - Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# First access: http://localhost:9000

services:
  mongodb:
    image: mongo:7
    container_name: iot-sentinel-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-sentinel}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-sentinel_secret}
    ports:
      - "${MONGO_PORT:-9017}:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: iot-sentinel-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-9079}:6379"
    volumes:
      - redis_data:/data

  frontend:
    image: mauricioj/iot-sentinel-frontend:latest
    container_name: iot-sentinel-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-9000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
    depends_on:
      - api

  api:
    image: mauricioj/iot-sentinel-api:latest
    container_name: iot-sentinel-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-9001}:4000"
    environment:
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-sentinel}:${MONGO_INITDB_ROOT_PASSWORD:-sentinel_secret}@mongodb:27017/iot-sentinel?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:9000}
    volumes:
      - api_secrets:/data/secrets
    depends_on:
      - mongodb
      - redis

  worker:
    image: mauricioj/iot-sentinel-worker:latest
    container_name: iot-sentinel-worker
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      REDIS_URL: redis://localhost:${REDIS_PORT:-9079}
      SCANNER_MOCK_MODE: ${SCANNER_MOCK_MODE:-auto}
    depends_on:
      - redis

volumes:
  mongodb_data:
  redis_data:
  api_secrets:
